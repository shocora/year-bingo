name: Deploy Instagram Sync Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-instagram-sync.yml"
      - "workers/**"
      - "shared/**"
      - "migrations/**"
      - "wrangler.instagram-sync.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.94.0"
          command: deploy --config wrangler.instagram-sync.toml
          preCommands: wrangler d1 migrations apply year-bingo-db --remote
          secrets: |
            INSTAGRAM_ACCESS_TOKEN
            INSTAGRAM_USER_ID
            OPENAI_API_KEY
            RUN_TOKEN
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_TOKEN: ${{ secrets.RUN_TOKEN }}
